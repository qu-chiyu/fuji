<!DOCTYPE html>

html{

body{

    background:#121212;

    display:flex;

    align-items:center;

@keyframes pageFadeIn{

header{

.site-title{

    margin-bottom:32px;

}
nav a{

    text-decoration:none;
    padding:11px 24px;
    border:2px solid #87ceeb;
    border-radius:8px;
    font-weight:bold;
    transition:all 0.25s ease;
    font-size:15px;
}
nav a:hover{
    background:#87ceeb;
    color:#000;
    transform: translateY(-2px);
    box-shadow:0 4px 12px rgba(135,206,235,0.25);
}
.container{
    width:100%;
    max-width:800px;
    padding:0 20px;
    flex:1;
}
.card{
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:10px;
    padding:28px;
    margin-bottom:24px;
    transition: border-color 0.3s;
}
.card:hover{
    border-color:#87ceeb66;
}
.card h2{
    color:#87ceeb;
    font-size:22px;
    margin-bottom:16px;
    padding-bottom:10px;
    border-bottom:1px solid #333;
    display:flex;
    align-items:center;
    gap:10px;
}
.card h2::before{
    content:"■";
    font-size:14px;
}
.card p{
    margin-bottom:8px;
    font-size:15px;
    color:#ddd;
}
.card .text-blue{
    color:#87ceeb;
    font-weight:bold;
}
.download-btn{
    display:inline-block;
    margin:10px 0;
    background:#87ceeb;
    color:#000;
    font-weight:bold;
    padding:12px 28px;
    border-radius:8px;
    text-decoration:none;
    transition:0.2s;
}
.download-btn:hover{
    background:#99d8f0;
    transform:scale(1.03);
}
.back-top{
    position:fixed;
    bottom:30px;
    right:20px;
    width:44px;
    height:44px;
    background:#87ceeb;
    color:#000;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
}
footer{
    margin-top:auto;
    padding:30px 20px;
    text-align:center;
    color:#777;
    font-size:13px;
    width:100%;
    border-top:1px solid #222;
}
@media(max-width:480px){
    .site-title{
        font-size:22px;
    }
    nav a{
        padding:9px 16px;
        font-size:14px;
    }
    .card{
        padding:20px;
    }
}
</style>
</head>
<body>
